<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>

    <link rel="stylesheet" href="simulador.css">
    <script src="simulador.js"></script>
    <script src="funciones.js"></script>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo-left">
            <img src="logo.png">
        </div>

        <h2 class="titulo-header"></h2>

        <div class="logo-right">
            <img src="logo_si.png">
        </div>
    </header>

    <!-- HERO + PANEL -->
    <section class="hero">

        <!-- TEXTO IZQUIERDO -->
        <div class="hero-text">
            <img src="lan.png">
            <p>Calcula tu capacidad de pago y obtén resultados en tiempo real.</p>
        </div>

        <!-- PANEL DERECHO -->
        <div class="panel">

            <h2>Simulador de Crédito</h2>

            <!-- DATOS -->
            <div class="grupo">
                <label>Ingresos</label>
                <input type="text" id="txtIngresos">

                <label>Egresos</label>
                <input type="text" id="txtEgresos">
            </div>

            <div class="resultado-box">
                <p>Disponible <span id="spnDisponible"></span></p>
                <p>Capacidad <span id="spnCapacidadPago"></span></p>
            </div>

            <!-- CRÉDITO -->
            <div class="grupo">
                <label>Monto</label>
                <input type="text" id="txtMonto">

                <label>Plazo (años)</label>
                <input type="text" id="txtPlazo">

                <label>Tasa (%)</label>
                <input type="text" id="txtTasaInteres">
            </div>

            <div class="resultado-box">
                <p>Interés <span id="spnInteresPagar"></span></p>
                <p>Total <span id="spnTotalPrestamo"></span></p>
                <p>Cuota <span id="spnCuotaMensual"></span></p>
            </div>

            <div class="estado">
                Estado: <span id="spnEstadoCredito">ANALIZANDO...</span>
            </div>

            <div class="buttons">
                <button id="btnCalcularCredito" onclick="calcular()">Calcular</button>
                <button id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
            </div>

        </div>
    </section>

</body>
</html>
